<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Income History – DTL Stocks</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div id="header-container"></div>>
  <nav class="navbar">
    <div class="logo"><strong>DTL Stocks</strong></div>
    <ul class="nav-links"><li><a href="dashboard.html">Dashboard</a></li><li><a href="income-history.html" class="active">Income</a></li></ul>
  </nav>
  <div class="section">
    <h2>Earnings History</h2>
    <table id="earnings-table"><thead><tr><th>Amount</th><th>Date</th><th>Reference</th></tr></thead><tbody></tbody></table>
  </div>
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
    const supabase = createClient('https://jytmnukzvxirnafukbck.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5dG1udWt6dnhpcm5hZnVrYmNrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxNjQ3MjUsImV4cCI6MjA5OTc0MDcyNX0.ZvGUPTW7dJ3UxL2N1TW0lBCe3H4559HaUEhks7vEbEw');
    (async () => {
      const user = (await supabase.auth.getUser()).data.user;
      const { data } = await supabase.from('transactions').select('*').eq('user_id', user.id).in('type', ['earning','referral','gift']).order('created_at', { ascending: false });
      document.querySelector('#earnings-table tbody').innerHTML = data?.map(t => `<tr><td>₦${t.amount.toLocaleString()}</td><td>${new Date(t.created_at).toLocaleDateString()}</td><td>${t.reference || ''}</td></tr>`).join('');
    })();
  </script>
  <div id="footer-container"></div>
  <script src="/assets/js/components.js"></script>
</body>
</html>
