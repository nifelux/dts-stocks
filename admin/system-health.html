<!DOCTYPE html>
<html lang="en" class="dark-theme">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>System Health – Admin</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <nav class="navbar"><div class="logo"><strong>Admin Panel</strong></div><a href="../dashboard.html">User Site</a></nav>
  <div class="flex">
    <aside class="sidebar">
      <ul class="sidebar-nav">
        <li><a href="index.html">Dashboard</a></li>
        <li><a href="users.html">Users</a></li>
        <li><a href="deposits.html">Deposits</a></li>
        <li><a href="withdrawals.html">Withdrawals</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="support.html">Support</a></li>
        <li><a href="kyc.html">KYC</a></li>
        <li><a href="reports.html">Reports</a></li>
        <li><a href="settings.html">Settings</a></li>
        <li><a href="logs.html">Logs</a></li>
      </ul>
    </aside>
    <main style="flex:1; padding:2rem;">
      <h2>System Health</h2>
      <div id="health-status">Checking...</div>
    </main>
  </div>
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
    const supabase = createClient('https://your-project.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...');
    (async () => {
      try {
        const { data, error } = await supabase.from('cron_logs').select('*').order('created_at', { ascending: false }).limit(1);
        if (error) throw error;
        const last = data[0];
        document.getElementById('health-status').innerHTML = `
          <div class="card"><h4>Database Connection</h4><p class="text-success">OK</p></div>
          <div class="card mt-2"><h4>Last Cron Job</h4><p>${last ? `${last.job_name} – ${last.status} (${new Date(last.created_at).toLocaleString()})` : 'No runs yet'}</p></div>
        `;
      } catch (err) {
        document.getElementById('health-status').innerHTML = `<div class="alert alert-danger">Error: ${err.message}</div>`;
      }
    })();
  </script>
</body>
</html>
