<!DOCTYPE html>
<html lang="en" class="dark-theme">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard – DTL Stocks</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <nav class="navbar"><div class="logo"><strong>Admin Panel</strong></div><a href="../dashboard.html">User Site</a></nav>
  <div class="flex">
    <aside class="sidebar">
      <ul class="sidebar-nav">
        <li><a href="index.html" class="active">Dashboard</a></li>
        <li><a href="users.html">Users</a></li>
        <li><a href="deposits.html">Deposits</a></li>
        <li><a href="withdrawals.html">Withdrawals</a></li>
        <li><a href="investments.html">Investments</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="vip.html">VIP</a></li>
        <li><a href="gift-codes.html">Gift Codes</a></li>
        <li><a href="support.html">Support</a></li>
        <li><a href="kyc.html">KYC</a></li>
        <li><a href="reports.html">Reports</a></li>
        <li><a href="settings.html">Settings</a></li>
        <li><a href="logs.html">Logs</a></li>
      </ul>
    </aside>
    <main style="flex:1; padding:2rem;">
      <h2>Overview</h2>
      <div class="widget-grid" id="stats"></div>
    </main>
  </div>
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
    const supabase = createClient('https://your-project.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...');
    async function checkAdmin() {
      const { data: { user } } = await supabase.auth.getUser();
      if (!user) return window.location.href = '../login.html';
      const { data: profile } = await supabase.from('profiles').select('is_admin').eq('id', user.id).single();
      if (!profile?.is_admin) return window.location.href = '../dashboard.html';
      return user;
    }
    (async () => {
      await checkAdmin();
      // Fetch stats via admin API
      const token = (await supabase.auth.getSession()).data.session?.access_token;
      const res = await fetch('/api/admin?action=stats', { headers: { Authorization: `Bearer ${token}` } });
      const stats = await res.json();
      document.getElementById('stats').innerHTML = `
        <div class="card stat-card"><div class="stat-value">${stats.totalUsers}</div><div class="stat-label">Total Users</div></div>
        <div class="card stat-card"><div class="stat-value">₦${(stats.totalDeposits||0).toLocaleString()}</div><div class="stat-label">Total Deposits</div></div>
        <div class="card stat-card"><div class="stat-value">₦${(stats.totalWithdrawals||0).toLocaleString()}</div><div class="stat-label">Total Withdrawals</div></div>
        <div class="card stat-card"><div class="stat-value">${stats.activeInvestments||0}</div><div class="stat-label">Active Investments</div></div>
      `;
    })();
  </script>
</body>
</html>
