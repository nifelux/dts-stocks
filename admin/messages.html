<!DOCTYPE html><html lang="en" class="dark-theme"><head><meta charset="UTF-8"><title>Messages – Admin</title><link rel="stylesheet" href="../assets/css/style.css"></head>
<body><nav class="navbar"><div class="logo"><strong>Admin Panel</strong></div></nav><div class="flex"><aside class="sidebar"><ul class="sidebar-nav"><li><a href="index.html">Dashboard</a></li><li><a href="messages.html" class="active">Messages</a></li></ul></aside><main style="flex:1; padding:2rem;"><h2>All Notifications</h2><div id="msgs"></div></main></div>
<script type="module">import {createClient} from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';const supabase=createClient('https://your-project.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...');(async()=>{const{data}=await supabase.from('notifications').select('*, profiles(email)').order('created_at',{ascending:false}).limit(50);document.getElementById('msgs').innerHTML=data.map(n=>`<div class="card mb-1"><strong>${n.title}</strong> to ${n.profiles?.email||n.user_id.slice(0,8)}: ${n.body} <small>${new Date(n.created_at).toLocaleString()}</small></div>`).join('');})();</script></body></html>
