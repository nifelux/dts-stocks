<!DOCTYPE html>
<html lang="en" class="dark-theme">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Referral Management – Admin</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <nav class="navbar"><div class="logo"><strong>Admin Panel</strong></div><a href="../dashboard.html">User Site</a></nav>
  <div class="flex">
    <aside class="sidebar">
      <ul class="sidebar-nav">
        <li><a href="index.html">Dashboard</a></li>
        <li><a href="users.html">Users</a></li>
        <li><a href="deposits.html">Deposits</a></li>
        <li><a href="withdrawals.html">Withdrawals</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="support.html">Support</a></li>
        <li><a href="kyc.html">KYC</a></li>
        <li><a href="reports.html">Reports</a></li>
        <li><a href="settings.html">Settings</a></li>
        <li><a href="logs.html">Logs</a></li>
      </ul>
    </aside>
    <main style="flex:1; padding:2rem;">
      <h2>Referral Settings</h2>
      <div class="card">
        <div class="form-group">
          <label>Referral Reward Percentage (%)</label>
          <input type="number" id="perc" class="form-input" min="0" max="100">
        </div>
        <button class="btn btn-primary" onclick="save()">Save Referral Percent</button>
      </div>
    </main>
  </div>
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
    const supabase = createClient('https://your-project.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...');
    async function getToken() { return (await supabase.auth.getSession()).data.session?.access_token; }
    (async () => {
      const token = await getToken();
      const res = await fetch('/api/admin?action=settingsGet', { headers: { Authorization: `Bearer ${token}` } });
      const s = await res.json();
      const ref = s.find(s => s.key === 'referral')?.value || {};
      document.getElementById('perc').value = ref.percent || 5;
    })();
    window.save = async () => {
      const token = await getToken();
      await fetch('/api/admin?action=settingsUpdate', { method: 'POST', headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` }, body: JSON.stringify({ key: 'referral', value: { percent: +document.getElementById('perc').value } }) });
      alert('Referral percentage updated');
    };
  </script>
</body>
</html>
