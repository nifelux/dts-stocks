<html lang="en" class="dark-theme">

</head>
<body>
  <nav class="navbar"><div class="logo"><strong>Admin Panel</strong></div><a href="../dashboard.html">User Site</a></nav>
  <div class="flex">
    <aside class="sidebar">
      <ul class="sidebar-nav">
        <li><a href="index.html">Dashboard</a></li>
        <li><a href="users.html">Users</a></li>
        <li><a href="deposits.html">Deposits</a></li>

        <li><a href="logs.html">Logs</a></li>
      </ul>
    </aside>
    <main style="flex:1; padding:2rem;">
      <h2>Income Distribution</h2>
      <p>Daily income for active investments runs automatically at midnight. You may trigger it manually below.</p>
      <button class="btn btn-primary" onclick="runNow()">Run Daily Income Now</button>
      <div id="result" class="mt-2"></div>
    </main>
  </div>
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
    const supabase = createClient('https://jytmnukzvxirnafukbck.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5dG1udWt6dnhpcm5hZnVrYmNrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxNjQ3MjUsImV4cCI6MjA5OTc0MDcyNX0.ZvGUPTW7dJ3UxL2N1TW0lBCe3H4559HaUEhks7vEbEw');
    async function getToken() { return (await supabase.auth.getSession()).data.session?.access_token; }
    window.runNow = async () => {
      const token = await getToken();
      const res = await fetch('/api/investment?action=triggerDailyIncome', { method: 'POST', headers: { Authorization: `Bearer ${token}` } });
      if (res.ok) {
        document.getElementById('result').innerHTML = '<div class="alert alert-success">Income distribution completed successfully.</div>';
      } else {
        document.getElementById('result').innerHTML = '<div class="alert alert-danger">Failed to run distribution.</div>';
      }
    };
  </script>
</body>
