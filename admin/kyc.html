<!DOCTYPE html>
<html lang="en" class="dark-theme">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KYC Review – Admin</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <nav class="navbar"><div class="logo"><strong>Admin Panel</strong></div><a href="../dashboard.html">User Site</a></nav>
  <div class="flex">
    <aside class="sidebar">
      <ul class="sidebar-nav">
        <li><a href="index.html">Dashboard</a></li>
        <li><a href="users.html">Users</a></li>
        <li><a href="deposits.html">Deposits</a></li>
        <li><a href="withdrawals.html">Withdrawals</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="support.html">Support</a></li>
        <li><a href="kyc.html" class="active">KYC</a></li>
        <li><a href="reports.html">Reports</a></li>
        <li><a href="settings.html">Settings</a></li>
        <li><a href="logs.html">Logs</a></li>
      </ul>
    </aside>
    <main style="flex:1; padding:2rem;">
      <h2>KYC Documents</h2>
      <div id="docs"></div>
    </main>
  </div>
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
    const supabase = createClient('https://your-project.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...');
    async function getToken() { return (await supabase.auth.getSession()).data.session?.access_token; }
    async function load() {
      const token = await getToken();
      const res = await fetch('/api/admin?action=kycList', { headers: { Authorization: `Bearer ${token}` } });
      const data = await res.json();
      document.getElementById('docs').innerHTML = data.map(d => `
        <div class="card mb-2">
          <p><strong>User:</strong> ${d.profiles?.email || d.user_id.slice(0,8)} | <strong>Type:</strong> ${d.doc_type} | <strong>Status:</strong> ${d.status}</p>
          <img src="${d.image_url}" style="max-width:200px; border-radius:8px;">
          ${d.status === 'pending' ? `
            <div class="flex gap-1 mt-1">
              <button class="btn btn-sm btn-success" onclick="approve('${d.id}')">Approve</button>
              <button class="btn btn-sm btn-danger" onclick="reject('${d.id}')">Reject</button>
            </div>` : ''}
        </div>
      `).join('');
    }
    window.approve = async (id) => {
      const token = await getToken();
      await fetch('/api/admin?action=approveKYC', { method:'POST', headers:{'Content-Type':'application/json',Authorization:`Bearer ${token}`}, body: JSON.stringify({ id }) });
      load();
    };
    window.reject = async (id) => {
      const token = await getToken();
      await fetch('/api/admin?action=rejectKYC', { method:'POST', headers:{'Content-Type':'application/json',Authorization:`Bearer ${token}`}, body: JSON.stringify({ id }) });
      load();
    };
    load();
  </script>
</body>
</html>
