<!DOCTYPE html>
<html lang="en" class="dark-theme">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Withdrawals – Admin</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <nav class="navbar"><div class="logo"><strong>Admin Panel</strong></div><a href="../dashboard.html">User Site</a></nav>
  <div class="flex">
    <aside class="sidebar">
      <ul class="sidebar-nav">
        <li><a href="index.html">Dashboard</a></li>
        <li><a href="users.html">Users</a></li>
        <li><a href="deposits.html">Deposits</a></li>
        <li><a href="withdrawals.html" class="active">Withdrawals</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="support.html">Support</a></li>
        <li><a href="kyc.html">KYC</a></li>
        <li><a href="reports.html">Reports</a></li>
        <li><a href="settings.html">Settings</a></li>
        <li><a href="logs.html">Logs</a></li>
      </ul>
    </aside>
    <main style="flex:1; padding:2rem;">
      <h2>Withdrawals</h2>
      <div class="flex gap-2 mb-2">
        <select id="status-filter" class="form-select">
          <option value="pending">Pending</option>
          <option value="approved">Approved</option>
          <option value="rejected">Rejected</option>
        </select>
        <button class="btn btn-primary" id="load-btn">Load</button>
      </div>
      <div id="error-alert" class="alert alert-danger" style="display:none;"></div>
      <table id="withdrawals-table"><thead><tr><th>User</th><th>Amount</th><th>Bank</th><th>Status</th><th>Payout</th><th>Action</th></tr></thead><tbody></tbody></table>
    </main>
  </div>
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
    const supabase = createClient('https://jytmnukzvxirnafukbck.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5dG1udWt6dnhpcm5hZnVrYmNrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxNjQ3MjUsImV4cCI6MjA5OTc0MDcyNX0.ZvGUPTW7dJ3UxL2N1TW0lBCe3H4559HaUEhks7vEbEw');

    async function getToken() { return (await supabase.auth.getSession()).data.session?.access_token; }

    function showError(msg) {
      const el = document.getElementById('error-alert');
      el.textContent = msg;
      el.style.display = 'block';
    }
    function clearError() {
      document.getElementById('error-alert').style.display = 'none';
    }

    function payoutCell(w) {
      if (w.status !== 'approved') return '<span class="text-muted">—</span>';
      if (w.payout_status === 'success') return '<span class="badge badge-success">Paid</span>';
      if (w.payout_status === 'processing') return '<span class="badge badge-warning">Sending…</span>';
      if (w.payout_status === 'failed') return '<span class="badge badge-danger">Failed</span>';
      return '<span class="badge">Not sent</span>';
    }

    function actionCell(w) {
      if (w.status === 'pending') {
        return `<button class="btn btn-sm btn-success" onclick="approve('${w.id}')">Approve</button> <button class="btn btn-sm btn-danger" onclick="reject('${w.id}')">Reject</button>`;
      }
      if (w.status === 'approved' && w.payout_status !== 'success') {
        const label = (w.payout_status === 'processing' || w.payout_status === 'failed') ? 'Retry Payout' : 'Send Payout';
        return `<button class="btn btn-sm btn-primary" onclick="sendPayout('${w.id}')">${label}</button>`;
      }
      return '';
    }

    async function load() {
      clearError();
      const status = document.getElementById('status-filter').value;
      const token = await getToken();
      const res = await fetch(`/api/admin?action=withdrawalsList&status=${status}`, { headers: { Authorization: `Bearer ${token}` } });
      const data = await res.json();
      if (!res.ok) { showError(data.error || 'Failed to load withdrawals'); return; }

      const tbody = document.querySelector('#withdrawals-table tbody');
      tbody.innerHTML = data.map(w => `
        <tr>
          <td>${w.profiles?.email || w.user_id?.slice(0,8)}</td>
          <td>₦${w.amount.toLocaleString()}</td>
          <td>${w.bank_details?.bank_name || ''} ${w.bank_details?.account_number || ''}</td>
          <td>${w.status}</td>
          <td>${payoutCell(w)}</td>
          <td>${actionCell(w)}</td>
        </tr>
      `).join('') || '<tr><td colspan="6" class="text-muted">No withdrawals in this status.</td></tr>';
    }

    window.approve = async (id) => {
      const token = await getToken();
      const res = await fetch('/api/finance?action=approveWithdrawal', { method:'POST', headers:{'Content-Type':'application/json', Authorization:`Bearer ${token}`}, body: JSON.stringify({ withdrawal_id: id }) });
      const json = await res.json();
      if (!res.ok) { showError(json.error || 'Approve failed'); return; }
      load();
    };

    window.reject = async (id) => {
      const token = await getToken();
      const res = await fetch('/api/finance?action=rejectWithdrawal', { method:'POST', headers:{'Content-Type':'application/json', Authorization:`Bearer ${token}`}, body: JSON.stringify({ withdrawal_id: id }) });
      const json = await res.json();
      if (!res.ok) { showError(json.error || 'Reject failed'); return; }
      load();
    };

    window.sendPayout = async (id) => {
      clearError();
      try {
        const token = await getToken();
        const res = await fetch('/api/withdraw-payout', { method:'POST', headers:{'Content-Type':'application/json', Authorization:`Bearer ${token}`}, body: JSON.stringify({ withdrawal_id: id }) });
        const json = await res.json();
        if (!res.ok || !json.success) {
          showError(json.error || `Payout request failed (${res.status})`);
        }
      } catch (err) {
        console.error('sendPayout failed:', err);
        showError(`Could not reach the payout endpoint: ${err.message}`);
      }
      load();
    };

    document.getElementById('load-btn').addEventListener('click', load);
    load();
  </script>
</body>
</html>
