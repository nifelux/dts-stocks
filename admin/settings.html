<!DOCTYPE html>
<html lang="en" class="dark-theme">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings – Admin</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <nav class="navbar"><div class="logo"><strong>Admin Panel</strong></div><a href="../dashboard.html">User Site</a></nav>
  <div class="flex">
    <aside class="sidebar">
      <ul class="sidebar-nav">
        <li><a href="index.html">Dashboard</a></li>
        <li><a href="users.html">Users</a></li>
        <li><a href="deposits.html">Deposits</a></li>
        <li><a href="withdrawals.html">Withdrawals</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="support.html">Support</a></li>
        <li><a href="kyc.html">KYC</a></li>
        <li><a href="reports.html">Reports</a></li>
        <li><a href="settings.html" class="active">Settings</a></li>
        <li><a href="logs.html">Logs</a></li>
      </ul>
    </aside>
    <main style="flex:1; padding:2rem;">
      <h2>Platform Settings</h2>
      <div class="card mb-2">
        <h4>Withdrawal Configuration</h4>
        <div class="form-group"><label>Min Amount (₦)</label><input id="w-min" type="number" class="form-input"></div>
        <div class="form-group"><label>Max Amount (₦)</label><input id="w-max" type="number" class="form-input"></div>
        <div class="form-group"><label><input id="w-enabled" type="checkbox"> Withdrawals Enabled</label></div>
        <button class="btn btn-primary" onclick="saveWithdrawal()">Save Withdrawal Settings</button>
      </div>
      <div class="card mb-2">
        <h4>Referral Percentage</h4>
        <div class="form-group"><label>Referral Reward %</label><input id="ref-percent" type="number" class="form-input"></div>
        <button class="btn btn-primary" onclick="saveReferral()">Save Referral</button>
      </div>
      <div class="card">
        <h4>Maintenance Mode</h4>
        <button id="mm-btn" class="btn btn-danger" onclick="toggleMaintenance()">Loading...</button>
      </div>
    </main>
  </div>
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
    const supabase = createClient('https://your-project.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...');
    async function getToken() { return (await supabase.auth.getSession()).data.session?.access_token; }
    async function loadSettings() {
      const token = await getToken();
      const res = await fetch('/api/admin?action=settingsGet', { headers: { Authorization: `Bearer ${token}` } });
      const settings = await res.json();
      const w = settings.find(s => s.key === 'withdrawal')?.value || {};
      document.getElementById('w-min').value = w.min_amount || 5000;
      document.getElementById('w-max').value = w.max_amount || 500000;
      document.getElementById('w-enabled').checked = w.enabled !== false;
      const ref = settings.find(s => s.key === 'referral')?.value || {};
      document.getElementById('ref-percent').value = ref.percent || 5;
      const mm = settings.find(s => s.key === 'maintenance_mode')?.value;
      document.getElementById('mm-btn').textContent = mm === 'true' ? 'Disable Maintenance' : 'Enable Maintenance';
      document.getElementById('mm-btn').className = mm === 'true' ? 'btn btn-success' : 'btn btn-danger';
    }
    window.saveWithdrawal = async () => {
      const token = await getToken();
      const value = {
        min_amount: +document.getElementById('w-min').value,
        max_amount: +document.getElementById('w-max').value,
        enabled: document.getElementById('w-enabled').checked
      };
      await fetch('/api/admin?action=settingsUpdate', { method:'POST', headers:{'Content-Type':'application/json',Authorization:`Bearer ${token}`}, body: JSON.stringify({ key: 'withdrawal', value }) });
      alert('Saved');
    };
    window.saveReferral = async () => {
      const token = await getToken();
      await fetch('/api/admin?action=settingsUpdate', { method:'POST', headers:{'Content-Type':'application/json',Authorization:`Bearer ${token}`}, body: JSON.stringify({ key: 'referral', value: { percent: +document.getElementById('ref-percent').value } }) });
      alert('Saved');
    };
    window.toggleMaintenance = async () => {
      const token = await getToken();
      const btn = document.getElementById('mm-btn');
      const enable = btn.textContent.includes('Enable');
      await fetch('/api/admin?action=maintenanceMode', { method:'POST', headers:{'Content-Type':'application/json',Authorization:`Bearer ${token}`}, body: JSON.stringify({ enabled: enable }) });
      loadSettings();
    };
    loadSettings();
  </script>
</body>
</html>
