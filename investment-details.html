<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Investment Details</title><link rel="stylesheet" href="assets/css/style.css"></head>
<body><nav class="navbar"><div class="logo">DTL Stocks</div><a href="investments.html">Back</a></nav>
<div class="section" id="detail"></div>
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
const supabase = createClient('https://your-project.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...');
(async()=>{const id=new URLSearchParams(location.search).get('id');const {data}=await supabase.from('investments').select('*, products(*)').eq('id',id).single();document.getElementById('detail').innerHTML=`<div class="card"><h2>${data.products.name}</h2><p>Invested: ₦${data.amount.toLocaleString()}</p><p>Daily ROI: ₦${data.daily_income.toLocaleString()}</p><p>Earned: ₦${data.total_income.toLocaleString()}</p><p>Status: ${data.status}</p></div>`;})();
</script></body></html>
