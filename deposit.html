<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deposit – DTL Stocks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<div id="header-container"></div>

<div class="section dashboard-page" style="max-width:480px;">
  <div class="page-header">
    <h2>Deposit Funds</h2>
    <p class="text-muted" style="margin-bottom:0;">Make a bank transfer to the details below, then enter your transfer sender details.</p>
  </div>

  <div id="error-alert" class="alert alert-danger" style="display:none;"></div>
  <div id="success-alert" class="alert alert-success" style="display:none;"></div>

  <!-- Bank Details Card -->
  <div class="card mb-3" style="background: var(--clr-bg-alt, #f8f9fa); border: 1px solid var(--clr-border, #e9ecef);">
    <h4 style="margin-top:0; margin-bottom: 0.75rem;">Bank Transfer Details</h4>
    <p style="margin-bottom:0.4rem;"><strong>Bank Name:</strong> GTBank</p>
    <p style="margin-bottom:0.4rem;"><strong>Account Number:</strong> 0123456789</p>
    <p style="margin-bottom:0;"><strong>Account Name:</strong> DTL Stocks Investment Ltd</p>
  </div>

  <form id="deposit-form" class="card">
    <div class="form-group mb-2">
      <label class="form-label">Amount Transferred (₦)</label>
      <input type="number" id="amount" class="form-input" required min="1000" placeholder="Minimum ₦1,000">
    </div>

    <div class="form-group mb-2">
      <label class="form-label">Payment Method</label>
      <select id="payment_method" class="form-select">
        <option value="bank_transfer">Bank Transfer</option>
        <option value="ussd">USSD</option>
        <option value="bank_deposit">Bank Deposit</option>
      </select>
    </div>

    <div class="form-group mb-3">
      <label class="form-label">Sender Name & Bank Used</label>
      <textarea id="sender_details" class="form-input" rows="3" placeholder="Enter Sender Full Name and Bank Name used for transfer (e.g. John Doe - OPay)" required></textarea>
    </div>

    <button type="submit" id="deposit-submit-btn" class="btn btn-primary btn-block">Submit Deposit Request</button>
  </form>

  <h3 class="mt-3 mb-2">Recent Deposits</h3>
  <div id="pending-deposits"><div class="card">Loading…</div></div>
</div>

<div id="footer-container"></div>
<script src="/assets/js/components.js"></script>
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
const supabase = createClient('https://jytmnukzvxirnafukbck.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5dG1udWt6dnhpcm5hZnVrYmNrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxNjQ3MjUsImV4cCI6MjA5OTc0MDcyNX0.ZvGUPTW7dJ3UxL2N1TW0lBCe3H4559HaUEhks7vEbEw');

window.supabase = supabase;

function showError(msg) {
  const box = document.getElementById('error-alert');
  box.textContent = msg;
  box.style.display = 'block';
  document.getElementById('success-alert').style.display = 'none';
}

function showSuccess(msg) {
  const box = document.getElementById('success-alert');
  box.textContent = msg;
  box.style.display = 'block';
  document.getElementById('error-alert').style.display = 'none';
}

document.getElementById('deposit-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  document.getElementById('error-alert').style.display = 'none';
  document.getElementById('success-alert').style.display = 'none';

  const { data: { session } } = await supabase.auth.getSession();
  if (!session) return (window.location.href = 'login.html');

  const amount = +document.getElementById('amount').value;
  const payment_method = document.getElementById('payment_method').value;
  const sender_details = document.getElementById('sender_details').value.trim();

  if (!sender_details) {
    showError('Please enter your sender name and bank name.');
    return;
  }

  const submitBtn = document.getElementById('deposit-submit-btn');
  submitBtn.disabled = true;
  submitBtn.textContent = 'Submitting request…';

  try {
    const res = await fetch('/api/finance?action=createDeposit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${session.access_token}` },
      body: JSON.stringify({
        amount,
        payment_method,
        payment_details: sender_details
      })
    });

    const data = await res.json();
    if (!res.ok) {
      showError(data.error || 'Could not submit deposit request.');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Submit Deposit Request';
      return;
    }

    showSuccess('Deposit request submitted successfully! Pending admin confirmation.');
    document.getElementById('deposit-form').reset();
    submitBtn.disabled = false;
    submitBtn.textContent = 'Submit Deposit Request';
    loadRecentDeposits();
  } catch (err) {
    showError(err.message || 'Network error — please try again.');
    submitBtn.disabled = false;
    submitBtn.textContent = 'Submit Deposit Request';
  }
});

const STATUS_BADGE = { pending: 'badge-warning', approved: 'badge-success', rejected: 'badge-danger' };

async function loadRecentDeposits() {
  const { data: { session } } = await supabase.auth.getSession();
  if (!session) return;

  const res = await fetch('/api/finance?action=listDeposits', {
    headers: { Authorization: `Bearer ${session.access_token}` }
  });
  const data = await res.json();

  const container = document.getElementById('pending-deposits');
  if (!data || data.length === 0) {
    container.innerHTML = '<div class="card text-muted">No deposit requests yet.</div>';
    return;
  }
  container.innerHTML = `<div class="card">${data.map(d => `
    <div class="txn-row">
      <span class="txn-icon" style="background:#DDF7EA;color:var(--clr-green-deep);">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>
      </span>
      <div class="txn-body">
        <div class="txn-title">₦${Number(d.amount).toLocaleString()}</div>
        <div class="txn-date">${new Date(d.created_at).toLocaleDateString()}</div>
      </div>
      <span class="badge ${STATUS_BADGE[d.status] || ''}">${d.status}</span>
    </div>
  `).join('')}</div>`;
}
loadRecentDeposits();
</script>
</body>
</html>
