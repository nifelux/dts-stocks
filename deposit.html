<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deposit – DTL Stocks</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div id="header-container"></div>>
  <nav class="navbar">
    <div class="logo"><strong>DTL Stocks</strong></div>
    <ul class="nav-links">
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="deposit.html" class="active">Deposit</a></li>
      <li><a href="#" id="logout-btn">Logout</a></li>
    </ul>
  </nav>

  <div class="section" style="max-width:600px; margin:auto;">
    <h2>Deposit Funds</h2>
    <p>Transfer the exact amount to the bank details below, then upload proof.</p>
    <div class="card mb-2" style="background:#fef9c3;">
      <strong>Bank: </strong>DTL Stocks Bank<br>
      <strong>Account: </strong>1234567890<br>
      <strong>Bank: </strong>Access Bank
    </div>
    <form id="deposit-form">
      <div class="form-group">
        <label class="form-label">Amount (₦)</label>
        <input type="number" id="amount" class="form-input" required min="1000">
      </div>
      <div class="form-group">
        <label class="form-label">Payment Method</label>
        <select id="method" class="form-select"><option>Bank Transfer</option><option>USDT</option></select>
      </div>
      <div class="form-group">
        <label class="form-label">Proof Screenshot</label>
        <input type="file" id="proof-file" accept="image/*" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Submit Deposit</button>
    </form>
    <h3 class="mt-3">Pending Deposits</h3>
    <div id="pending-deposits"></div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
    const supabase = createClient('https://jytmnukzvxirnafukbck.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5dG1udWt6dnhpcm5hZnVrYmNrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxNjQ3MjUsImV4cCI6MjA5OTc0MDcyNX0.ZvGUPTW7dJ3UxL2N1TW0lBCe3H4559HaUEhks7vEbEw');
    
    async function uploadFile(file) {
      const fileName = `${Date.now()}_${file.name}`;
      const { data, error } = await supabase.storage.from('proofs').upload(fileName, file);
      if (error) throw error;
      const { data: { publicUrl } } = supabase.storage.from('proofs').getPublicUrl(data.path);
      return publicUrl;
    }

    document.getElementById('deposit-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const user = (await supabase.auth.getUser()).data.user;
      if (!user) return (window.location.href = 'login.html');
      const amount = +document.getElementById('amount').value;
      const method = document.getElementById('method').value;
      const file = document.getElementById('proof-file').files[0];
      if (!file) return alert('Upload proof');
      
      try {
        const proofUrl = await uploadFile(file);
        const { error } = await supabase.from('deposits').insert({
          user_id: user.id, amount, payment_method: method, proof_image_url: proofUrl
        });
        if (error) return alert(error.message);
        alert('Deposit submitted for approval!');
        location.reload();
      } catch (err) { alert(err.message); }
    });

    async function loadPending() {
      const user = (await supabase.auth.getUser()).data.user;
      if (!user) return;
      const { data } = await supabase.from('deposits').select('*').eq('user_id', user.id).eq('status', 'pending');
      document.getElementById('pending-deposits').innerHTML = data?.map(d => 
        `<div class="card mb-1">₦${d.amount.toLocaleString()} – Pending</div>`
      ).join('') || 'No pending deposits';
    }
    loadPending();
  </script>
  <div id="footer-container"></div>
  <script src="/assets/js/components.js"></script>
</body>
</html>
