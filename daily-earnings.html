<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Earnings – DTL Stocks</title>
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<div id="header-container"></div>

<div class="section">
<h2>Daily Earnings Breakdown</h2>
<table><thead><tr><th>Date</th><th>Amount</th></tr></thead><tbody id="daily-tbody"></tbody></table>
</div>

<div id="footer-container"></div>
<script src="/assets/js/components.js"></script>
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
const supabase = createClient('https://jytmnukzvxirnafukbck.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5dG1udWt6dnhpcm5hZnVrYmNrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxNjQ3MjUsImV4cCI6MjA5OTc0MDcyNX0.ZvGUPTW7dJ3UxL2N1TW0lBCe3H4559HaUEhks7vEbEw');

// Required so the shared header (assets/js/components.js) can detect
// the logged-in session — without this it always shows the guest menu.
window.supabase = supabase;

(async () => {
  const user = (await supabase.auth.getUser()).data.user;
  if (!user) return;
  const { data } = await supabase.from('transactions').select('amount, created_at').eq('user_id', user.id).eq('type', 'earning').order('created_at', { ascending: false });
  const grouped = {};
  data?.forEach(t => { const d = new Date(t.created_at).toLocaleDateString(); grouped[d] = (grouped[d]||0)+t.amount; });
  document.getElementById('daily-tbody').innerHTML = Object.entries(grouped).map(([date, amt]) => `<tr><td>${date}</td><td>₦${amt.toLocaleString()}</td></tr>`).join('') || '';
})();
</script>
</body>
</html>
