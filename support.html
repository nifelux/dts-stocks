<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support – DTL Stocks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<div id="header-container"></div>

<div class="section dashboard-page" style="max-width:560px;">
  <div class="page-header">
    <h2>Support</h2>
    <p class="text-muted" style="margin-bottom:0;">Reach our team directly — usually a reply within 24 hours.</p>
  </div>

  <div class="card">
    <h3 class="mb-2" style="font-family:var(--font-display);font-size:1.15rem;">New Ticket</h3>
    <form id="ticket-form">
      <div class="form-group">
        <label class="form-label">Subject</label>
        <input id="subject" class="form-input" placeholder="What's this about?" required>
      </div>
      <div class="form-group" style="margin-bottom:0.9rem;">
        <label class="form-label">Message</label>
        <textarea id="message" class="form-textarea" placeholder="Describe your issue…" required></textarea>
      </div>
      <button class="btn btn-primary btn-block" id="ticket-submit-btn">Submit Ticket</button>
    </form>
  </div>

  <div class="page-header mt-3">
    <h2 style="font-size:1.2rem;">My Tickets</h2>
  </div>
  <div class="card" id="tickets-list">
    <div class="text-center text-muted">Loading…</div>
  </div>
</div>

<div id="footer-container"></div>
<script src="/assets/js/components.js"></script>
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
const supabase = createClient('https://jytmnukzvxirnafukbck.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5dG1udWt6dnhpcm5hZnVrYmNrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxNjQ3MjUsImV4cCI6MjA5OTc0MDcyNX0.ZvGUPTW7dJ3UxL2N1TW0lBCe3H4559HaUEhks7vEbEw');

// Required so the shared header (assets/js/components.js) can detect
// the logged-in session — without this it always shows the guest menu.
window.supabase = supabase;

function statusBadge(status) {
  const s = (status || 'open').toLowerCase();
  if (s === 'resolved' || s === 'closed') return `<span class="badge badge-success">${s.toUpperCase()}</span>`;
  if (s === 'pending') return `<span class="badge badge-warning">${s.toUpperCase()}</span>`;
  return `<span class="badge">${s.toUpperCase()}</span>`;
}

function formatDate(d) {
  return new Date(d).toLocaleDateString('en-NG', { year: 'numeric', month: 'short', day: 'numeric' });
}

document.getElementById('ticket-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const user = (await supabase.auth.getUser()).data.user;
  if (!user) return (window.location.href = 'login.html');

  const btn = document.getElementById('ticket-submit-btn');
  btn.disabled = true;
  btn.textContent = 'Submitting…';

  await supabase.from('support_tickets').insert({
    user_id: user.id,
    subject: document.getElementById('subject').value,
    message: document.getElementById('message').value
  });

  alert('Ticket created');
  location.reload();
});

async function loadTickets() {
  const user = (await supabase.auth.getUser()).data.user;
  if (!user) return (window.location.href = 'login.html');

  const { data } = await supabase.from('support_tickets').select('*').eq('user_id', user.id).order('created_at', { ascending: false });
  const container = document.getElementById('tickets-list');

  if (!data || data.length === 0) {
    container.innerHTML = '<div class="text-center text-muted p-2">No tickets yet — submit one above if you need help.</div>';
    return;
  }

  container.innerHTML = data.map(t => `
    <div class="ticket-row">
      <div>
        <div class="ticket-subject">${t.subject}</div>
        <div class="ticket-date">${formatDate(t.created_at)}</div>
      </div>
      ${statusBadge(t.status)}
    </div>
  `).join('');
}
loadTickets();
</script>
</body>
</html>
