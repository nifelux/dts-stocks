<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Settings</title>
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<div id="header-container"></div>
<div class="section" style="max-width:400px;margin:auto">
  <h2>Settings</h2>
  <form id="pwd-form">
    <div class="form-group"><label>New Password</label><input type="password" id="password" class="form-input"></div>
    <button class="btn btn-primary btn-block">Change Password</button>
  </form>
</div>

<div id="footer-container"></div>
<script src="/assets/js/components.js"></script>
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
const supabase = createClient('https://jytmnukzvxirnafukbck.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5dG1udWt6dnhpcm5hZnVrYmNrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxNjQ3MjUsImV4cCI6MjA5OTc0MDcyNX0.ZvGUPTW7dJ3UxL2N1TW0lBCe3H4559HaUEhks7vEbEw');

// Required so the shared header (assets/js/components.js) can detect
// the logged-in session — without this it always shows the guest menu.
window.supabase = supabase;

document.getElementById('pwd-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const { error } = await supabase.auth.updateUser({ password: document.getElementById('password').value });
  if (error) return alert(error.message);
  alert('Password updated');
  e.target.reset();
});
</script>
</body>
</html>
