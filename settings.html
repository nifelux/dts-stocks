<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Settings</title><link rel="stylesheet" href="assets/css/style.css"></head>
<body><nav class="navbar"><div class="logo">DTL Stocks</div></nav><div class="section" style="max-width:400px;margin:auto"><h2>Settings</h2>
<form id="pwd-form"><div class="form-group"><label>New Password</label><input type="password" id="password" class="form-input"></div><button class="btn btn-primary btn-block">Change Password</button></form></div>
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
const supabase = createClient('https://your-project.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...');
document.getElementById('pwd-form').addEventListener('submit',async(e)=>{e.preventDefault();await supabase.auth.updateUser({password:document.getElementById('password').value});alert('Password updated');});
</script></body></html>
