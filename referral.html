<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Referral – DTL Stocks</title>
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<div id="header-container"></div>

<div class="section" style="max-width:600px; margin:auto;">
<h2>Referral Program</h2>
<div class="card mb-2">
<p>Your Referral Link:</p>
<input type="text" id="ref-link" class="form-input" readonly>
<button class="btn btn-primary btn-sm mt-1" id="copy-link-btn">Copy</button>
</div>
<div class="card mb-2">
<h3>Your Referrals</h3>
<div id="direct-referrals"></div>
</div>
<div class="card">
<h3>Referral Rewards</h3>
<div id="referral-rewards"></div>
</div>
</div>

<div id="footer-container"></div>
<script src="/assets/js/components.js"></script>
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
const supabase = createClient('https://jytmnukzvxirnafukbck.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5dG1udWt6dnhpcm5hZnVrYmNrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxNjQ3MjUsImV4cCI6MjA5OTc0MDcyNX0.ZvGUPTW7dJ3UxL2N1TW0lBCe3H4559HaUEhks7vEbEw');

// Required so the shared header (assets/js/components.js) can detect
// the logged-in session — without this it always shows the guest menu.
window.supabase = supabase;

async function loadReferral() {
  const { data: { user } } = await supabase.auth.getUser();
  if (!user) return;

  const { data: profile } = await supabase.from('profiles').select('referral_code').eq('id', user.id).single();
  const link = `${window.location.origin}/register.html?ref=${profile.referral_code}`;
  document.getElementById('ref-link').value = link;

  const { data: direct } = await supabase.from('profiles').select('full_name, email, created_at').eq('referred_by', user.id);
  document.getElementById('direct-referrals').innerHTML = direct?.map(d => `<p>${d.full_name || d.email} (joined ${new Date(d.created_at).toLocaleDateString()})</p>`).join('') || 'None';

  const { data: rewards } = await supabase.from('referral_rewards').select('*').eq('referrer_id', user.id);
  document.getElementById('referral-rewards').innerHTML = rewards?.map(r => `<p>₦${r.reward_amount.toLocaleString()} – Level ${r.level} (${r.transaction_type})</p>`).join('') || 'No rewards yet';
}

loadReferral();

document.getElementById('copy-link-btn').addEventListener('click', () => {
  const inp = document.getElementById('ref-link');
  inp.select();
  document.execCommand('copy');
  alert('Link copied!');
});
</script>
</body>
</html>
