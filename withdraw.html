<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Withdraw – DTL Stocks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<div id="header-container"></div>

<div class="section dashboard-page" style="max-width:500px;">
  <div class="page-header">
    <h2>Withdraw Funds</h2>
    <p class="text-muted" style="margin-bottom:0;">Cash out to your bank account.</p>
  </div>

  <div id="kyc-gate" style="display:none;" class="alert alert-danger kyc-banner mb-2">
    <span>Identity verification required before you can withdraw.</span>
    <a href="/kyc.html" class="btn btn-sm btn-primary">Verify Now</a>
  </div>

  <div id="error-alert" class="alert alert-danger" style="display:none;"></div>

  <form id="withdraw-form" class="card">
    <div class="form-group"><label class="form-label">Amount (₦)</label><input type="number" id="amount" class="form-input" required></div>
    <div class="form-group"><label class="form-label">Bank Name</label><input id="bank_name" class="form-input" required></div>
    <div class="form-group"><label class="form-label">Account Number</label><input id="account_number" class="form-input" required maxlength="10"></div>
    <div class="form-group"><label class="form-label">Account Name</label><input id="account_name" class="form-input" required></div>
    <button type="submit" id="withdraw-submit-btn" class="btn btn-primary btn-block">Request Withdrawal</button>
  </form>

  <h3 class="mt-3 mb-2">Withdrawal History</h3>
  <div id="history"><div class="card">Loading…</div></div>
</div>

<div id="footer-container"></div>
<script src="/assets/js/components.js"></script>
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
const supabase = createClient('https://jytmnukzvxirnafukbck.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5dG1udWt6dnhpcm5hZnVrYmNrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxNjQ3MjUsImV4cCI6MjA5OTc0MDcyNX0.ZvGUPTW7dJ3UxL2N1TW0lBCe3H4559HaUEhks7vEbEw');

// Required so the shared header (assets/js/components.js) can detect
// the logged-in session — without this it always shows the guest menu.
window.supabase = supabase;

function showError(msg) {
  const box = document.getElementById('error-alert');
  box.textContent = msg;
  box.style.display = 'block';
}

document.getElementById('withdraw-form').addEventListener('submit', async (e) => {
  // preventDefault must run synchronously, before any await
  e.preventDefault();
  document.getElementById('error-alert').style.display = 'none';

  const user = (await supabase.auth.getUser()).data.user;
  if (!user) return (window.location.href = 'login.html');

  const { data: kycProfile } = await supabase.from('profiles').select('kyc_status').eq('id', user.id).single();
  if (kycProfile?.kyc_status !== 'approved') {
    return showError('KYC verification required before you can withdraw.');
  }

  const { data: settings } = await supabase.from('settings').select('*').eq('key', 'withdrawal').single();
  const wSet = settings?.value || {};
  if (!wSet.enabled) return showError('Withdrawals are currently disabled.');

  const amount = +document.getElementById('amount').value;
  const bank_name = document.getElementById('bank_name').value;
  const account_number = document.getElementById('account_number').value;
  const account_name = document.getElementById('account_name').value;

  const submitBtn = document.getElementById('withdraw-submit-btn');
  submitBtn.disabled = true;
  submitBtn.textContent = 'Submitting…';

  const { error } = await supabase.from('withdrawals').insert({
    user_id: user.id, amount,
    bank_details: { bank_name, account_number, account_name }
  });

  submitBtn.disabled = false;
  submitBtn.textContent = 'Request Withdrawal';

  if (error) return showError(error.message);
  alert('Withdrawal request submitted!');
  location.reload();
});

const STATUS_BADGE = { pending: 'badge-warning', approved: 'badge-success', rejected: 'badge-danger' };

async function loadHistory() {
  const user = (await supabase.auth.getUser()).data.user;
  if (!user) return;

  const { data: profile } = await supabase.from('profiles').select('kyc_status').eq('id', user.id).single();
  if (profile?.kyc_status !== 'approved') {
    document.getElementById('kyc-gate').style.display = 'flex';
    document.getElementById('withdraw-form').style.display = 'none';
  }

  const { data } = await supabase.from('withdrawals').select('*').eq('user_id', user.id).order('created_at', { ascending: false });
  const container = document.getElementById('history');
  if (!data || data.length === 0) {
    container.innerHTML = '<div class="card text-muted">No withdrawals yet.</div>';
    return;
  }
  container.innerHTML = `<div class="card">${data.map(w => `
    <div class="txn-row">
      <span class="txn-icon" style="background:#EFEDF5;color:var(--clr-purple-ink);">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
      </span>
      <div class="txn-body">
        <div class="txn-title">₦${w.amount.toLocaleString()}</div>
        <div class="txn-date">${new Date(w.created_at).toLocaleDateString()}</div>
      </div>
      <span class="badge ${STATUS_BADGE[w.status] || ''}">${w.status}</span>
    </div>
  `).join('')}</div>`;
}
loadHistory();
</script>
</body>
</html>
