<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Withdraw – DTL Stocks</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div id="header-container"></div>

  <div class="section" style="max-width:500px; margin:auto;">
    <h2>Withdraw Funds</h2>

    <div class="card mb-2" id="balance-note" style="display:none;">
      <span class="text-muted">Available balance:</span>
      <strong class="currency-ngn" id="available-balance">0</strong>
    </div>

    <div id="error-alert" class="alert alert-danger" style="display:none;"></div>
    <div id="kyc-gate"></div>

    <form id="withdraw-form">
      <div class="form-group"><label class="form-label">Amount (₦)</label><input type="number" id="amount" class="form-input" required></div>
      <div class="form-group">
        <label class="form-label">Bank</label>
        <select id="bank_code" class="form-select" required><option value="" disabled selected>Select your bank</option></select>
      </div>
      <div class="form-group"><label class="form-label">Account Number</label><input id="account_number" class="form-input" required maxlength="10"></div>
      <div class="form-group"><label class="form-label">Account Name</label><input id="account_name" class="form-input" required></div>
      <button type="submit" class="btn btn-primary btn-block" id="withdraw-submit-btn">Request Withdrawal</button>
    </form>

    <h3 class="mt-3">Withdrawal History</h3>
    <div id="history">Loading…</div>
  </div>

  <div id="footer-container"></div>
  <script src="/assets/js/components.js"></script>
  <script src="/assets/js/bank-list.js"></script>
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
    const supabase = createClient(
      'https://jytmnukzvxirnafukbck.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5dG1udWt6dnhpcm5hZnVrYmNrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxNjQ3MjUsImV4cCI6MjA5OTc0MDcyNX0.ZvGUPTW7dJ3UxL2N1TW0lBCe3H4559HaUEhks7vEbEw'
    );

    // Required so the shared header (assets/js/components.js) can detect
    // the logged-in session — without this it always shows the guest menu.
    window.supabase = supabase;

    async function checkAuth() {
      const { data: { user } } = await supabase.auth.getUser();
      if (!user) window.location.href = 'login.html';
      return user;
    }

    function showError(msg) {
      const el = document.getElementById('error-alert');
      el.textContent = msg;
      el.style.display = 'block';
    }
    function clearError() {
      document.getElementById('error-alert').style.display = 'none';
    }

    function statusBadge(status) {
      const map = { approved: 'badge-success', pending: 'badge-warning', rejected: 'badge-danger' };
      return `<span class="badge ${map[status] || ''}">${status}</span>`;
    }

    function populateBankSelect() {
      const select = document.getElementById('bank_code');
      (window.NGN_BANKS || []).forEach((bank) => {
        const opt = document.createElement('option');
        opt.value = bank.code;
        opt.textContent = bank.name;
        select.appendChild(opt);
      });
    }
    populateBankSelect();

    let currentUser = null;
    let currentBalance = 0;

    async function loadBalanceAndGate(user) {
      const { data: wallet } = await supabase.from('wallets').select('balance').eq('user_id', user.id).single();
      currentBalance = wallet?.balance || 0;
      document.getElementById('available-balance').textContent = currentBalance.toLocaleString();
      document.getElementById('balance-note').style.display = 'block';

      const { data: profile } = await supabase.from('profiles').select('kyc_status').eq('id', user.id).single();
      if (profile?.kyc_status !== 'approved') {
        document.getElementById('kyc-gate').innerHTML =
          '<div class="alert alert-danger">KYC verification required. Please <a href="/kyc.html">upload your face and full name</a> for identity verification.</div>';
        document.getElementById('withdraw-form').style.display = 'none';
      }
    }

    async function callFinanceApi(action, body) {
      const { data: { session } } = await supabase.auth.getSession();
      const res = await fetch(`/api/finance?action=${action}`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          Authorization: `Bearer ${session?.access_token}`,
        },
        body: JSON.stringify(body || {}),
      });
      const json = await res.json();
      if (!res.ok) throw new Error(json.error || 'Request failed');
      return json;
    }

    document.getElementById('withdraw-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError();
      if (!currentUser) return;

      const amount = +document.getElementById('amount').value;
      const bankSelect = document.getElementById('bank_code');
      const bank_code = bankSelect.value;
      const bank_name = bankSelect.selectedOptions[0]?.textContent || '';
      const account_number = document.getElementById('account_number').value;
      const account_name = document.getElementById('account_name').value;

      if (!bank_code) return showError('Please select your bank.');
      if (amount > currentBalance) return showError('That amount is more than your available balance.');

      const btn = document.getElementById('withdraw-submit-btn');
      btn.disabled = true;
      btn.textContent = 'Submitting…';

      try {
        // Min/max amount and the processing-hours window are enforced
        // server-side in api/finance.js (createWithdrawal) — the
        // `settings` table is RLS-locked to service_role only, so this
        // page can't read those limits itself to pre-validate.
        await callFinanceApi('createWithdrawal', { amount, bank_code, bank_name, account_number, account_name });
        alert('Withdrawal request submitted!');
        location.reload();
      } catch (err) {
        showError(err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Request Withdrawal';
      }
    });

    async function loadHistory(user) {
      const { data } = await supabase.from('withdrawals').select('*').eq('user_id', user.id).order('created_at', { ascending: false });
      document.getElementById('history').innerHTML = data?.map(w => `
        <div class="txn-row">
          <span class="currency-ngn">${w.amount.toLocaleString()}</span>
          ${statusBadge(w.status)}
          <span class="text-muted" style="font-size:0.8rem;">${new Date(w.created_at).toLocaleDateString()}</span>
        </div>`).join('') || '<p class="text-muted">No withdrawals yet.</p>';
    }

    checkAuth().then(async (user) => {
      if (!user) return;
      currentUser = user;
      await loadBalanceAndGate(user);
      await loadHistory(user);
    });
  </script>
</body>
</html>
