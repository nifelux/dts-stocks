<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – DTL Stocks</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    .auth-container { max-width: 400px; margin: 5rem auto; padding: 2rem; }
  </style>
</head>
<body>
  <div id="header-container"></div>>
  <div class="auth-container card">
    <h2 class="text-center">Welcome Back</h2>
    <div id="error-alert" class="alert alert-danger" style="display:none;"></div>
    <form id="login-form">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="email" class="form-input" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-input" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Login</button>
    </form>
    <p class="text-center mt-2">Don't have an account? <a href="register.html">Register</a></p>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
    const supabase = createClient('https://jytmnukzvxirnafukbck.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5dG1udWt6dnhpcm5hZnVrYmNrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxNjQ3MjUsImV4cCI6MjA5OTc0MDcyNX0.ZvGUPTW7dJ3UxL2N1TW0lBCe3H4559HaUEhks7vEbEw');
    
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('error-alert');
      errorDiv.style.display = 'none';

      const { data, error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) {
        errorDiv.textContent = error.message;
        errorDiv.style.display = 'block';
        return;
      }
      // Check if admin
      const { data: profile } = await supabase.from('profiles').select('is_admin').eq('id', data.user.id).single();
      if (profile?.is_admin) {
        window.location.href = '/admin/index.html';
      } else {
        window.location.href = '/dashboard.html';
      }
    });
  </script>
  <div id="footer-container"></div>
  <script src="/assets/js/components.js"></script>
</body>
</html>
