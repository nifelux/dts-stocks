<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – DTL Stocks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    #page-content{visibility:hidden}
    .auth-wrap{max-width:420px;margin:3rem auto;padding:0 1.25rem 3rem;}
    .auth-hero-icon{
      width:56px;height:56px;border-radius:16px;background:var(--gradient-purple);color:#fff;
      display:flex;align-items:center;justify-content:center;margin:0 auto 1.1rem;
      box-shadow:0 10px 24px -10px rgba(76,52,176,0.5);
    }
    .auth-hero-icon svg{width:26px;height:26px}
    .auth-title{font-family:var(--font-display);font-weight:600;font-size:1.7rem;text-align:center;color:var(--clr-purple-ink);margin-bottom:0.3rem}
    .auth-subtitle{text-align:center;color:var(--clr-text-secondary);font-size:0.92rem;margin-bottom:1.75rem}
  </style>
</head>
<body>
  <div id="header-container"></div>

  <div id="page-content">
    <div class="auth-wrap">
      <span class="auth-hero-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </span>
      <h2 class="auth-title">Welcome Back</h2>
      <p class="auth-subtitle">Log in to manage your investments.</p>

      <div id="error-alert" class="alert alert-danger" style="display:none;"></div>

      <form id="login-form" class="card form-card">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="email" class="form-input" required autocomplete="email">
        </div>
        <div class="form-group" style="margin-bottom:0;">
          <label class="form-label">Password</label>
          <input type="password" id="password" class="form-input" required autocomplete="current-password">
        </div>
        <button type="submit" id="login-btn" class="btn btn-primary btn-block" style="margin-top:1.5rem;">Login</button>
      </form>

      <p class="text-center mt-2">Don't have an account? <a href="register.html">Register</a></p>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
    const supabase = createClient('https://jytmnukzvxirnafukbck.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5dG1udWt6dnhpcm5hZnVrYmNrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxNjQ3MjUsImV4cCI6MjA5OTc0MDcyNX0.ZvGUPTW7dJ3UxL2N1TW0lBCe3H4559HaUEhks7vEbEw');
    window.supabase = supabase;

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('error-alert');
      const btn = document.getElementById('login-btn');
      errorDiv.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Logging in…';

      const { data, error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) {
        errorDiv.textContent = error.message;
        errorDiv.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Login';
        return;
      }
      // Check if admin
      const { data: profile } = await supabase.from('profiles').select('is_admin').eq('id', data.user.id).single();
      if (profile?.is_admin) {
        window.location.href = '/admin/index.html';
      } else {
        window.location.href = '/dashboard.html';
      }
    });

    // Guest-only page — an already-logged-in visitor shouldn't see the
    // login form at all, send them straight to their dashboard.
    (async () => {
      const { data: { session } } = await supabase.auth.getSession();
      if (session) {
        window.location.href = '/dashboard.html';
        return;
      }
      document.getElementById('page-content').style.visibility = 'visible';
    })();
  </script>
  <div id="footer-container"></div>
  <script src="/assets/js/components.js"></script>
</body>
</html>
