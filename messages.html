<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Messages</title><link rel="stylesheet" href="assets/css/style.css"></head>
<body><nav class="navbar"><div class="logo">DTL Stocks</div></nav><div class="section"><h2>Messages</h2><div id="msgs">Loading...</div></div>
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
const supabase = createClient('https://your-project.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...');
(async()=>{const u=(await supabase.auth.getUser()).data.user;const {data}=await supabase.from('notifications').select('*').eq('user_id',u.id).order('created_at',{ascending:false});document.getElementById('msgs').innerHTML=data?.map(n=>`<div class="card mb-1"><strong>${n.title}</strong><p>${n.body}</p></div>`).join('')||'No messages';})();
</script></body></html>
