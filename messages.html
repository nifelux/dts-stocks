<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messages – DTL Stocks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<div id="header-container"></div>

<div class="section dashboard-page" style="max-width:560px;">
  <div class="page-header">
    <h2>Messages</h2>
    <p class="text-muted" style="margin-bottom:0;">Notifications and alerts from DTL Stocks.</p>
  </div>

  <div class="card" id="msgs">
    <div class="text-center text-muted">Loading…</div>
  </div>
</div>

<div id="footer-container"></div>
<script src="/assets/js/components.js"></script>
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
const supabase = createClient('https://jytmnukzvxirnafukbck.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5dG1udWt6dnhpcm5hZnVrYmNrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxNjQ3MjUsImV4cCI6MjA5OTc0MDcyNX0.ZvGUPTW7dJ3UxL2N1TW0lBCe3H4559HaUEhks7vEbEw');

// Required so the shared header (assets/js/components.js) can detect
// the logged-in session — without this it always shows the guest menu.
window.supabase = supabase;

const BELL_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>';

function formatDate(d) {
  return new Date(d).toLocaleDateString('en-NG', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}

(async () => {
  const u = (await supabase.auth.getUser()).data.user;
  if (!u) return (window.location.href = 'login.html');

  const { data } = await supabase.from('notifications').select('*').eq('user_id', u.id).order('created_at', { ascending: false });
  const container = document.getElementById('msgs');

  if (!data || data.length === 0) {
    container.innerHTML = `
      <div class="history-empty">
        <span class="history-empty-icon">${BELL_ICON}</span>
        <strong>No messages yet</strong>
        <span>Notifications about your account will show up here.</span>
      </div>`;
    return;
  }

  container.innerHTML = data.map(n => `
    <div class="notification-row">
      <span class="notification-icon">
        ${BELL_ICON}
        ${n.is_read === false ? '<span class="notification-unread-dot"></span>' : ''}
      </span>
      <div class="notification-body">
        <div class="notification-title">${n.title}</div>
        <div class="notification-text">${n.body}</div>
        <div class="notification-date">${formatDate(n.created_at)}</div>
      </div>
    </div>
  `).join('');
})();
</script>
</body>
</html>
