<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
const supabase = createClient('https://jytmnukzvxirnafukbck.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5dG1udWt6dnhpcm5hZnVrYmNrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxNjQ3MjUsImV4cCI6MjA5OTc0MDcyNX0.ZvGUPTW7dJ3UxL2N1TW0lBCe3H4559HaUEhks7vEbEw');

// Required so the shared header (assets/js/components.js) can detect
// the logged-in session — without this it always shows the guest menu.
window.supabase = supabase;

function initials(name) {
  if (!name) return '?';
  const parts = name.trim().split(/\s+/);
  return ((parts[0]?.[0] || '') + (parts[1]?.[0] || '')).toUpperCase() || name[0].toUpperCase();
}

async function loadProfile() {
  const user = (await supabase.auth.getUser()).data.user;
  if (!user) return (window.location.href = 'login.html');
  const { data } = await supabase.from('profiles').select('*').eq('id', user.id).single();

  document.getElementById('full_name').value = data.full_name || '';
  document.getElementById('phone').value = data.phone || '';
  document.getElementById('profile-name').textContent = data.full_name || user.email;
  document.getElementById('profile-email').textContent = data.email || user.email;
  document.getElementById('profile-avatar').textContent = initials(data.full_name || user.email);
  document.getElementById('profile-vip').textContent = (data.vip_level || 'bronze').toUpperCase();
}

document.getElementById('profile-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const user = (await supabase.auth.getUser()).data.user;
  const { error } = await supabase.from('profiles').update({
    full_name: document.getElementById('full_name').value,
    phone: document.getElementById('phone').value
  }).eq('id', user.id);
  if (error) return alert(error.message);
  alert('Profile updated');
  loadProfile();
});

loadProfile();
</script>
