<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KYC Verification – DTL Stocks</title>
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<div id="header-container"></div>

<div class="section" style="max-width:500px; margin:auto; padding-top: 80px;">
  <h2>Identity Verification</h2>
  <p class="alert alert-info" id="kyc-status-banner">
    To prevent duplicate accounts and protect your funds, please upload a valid government ID (front &amp; back)
    and a clear selfie. All documents are required before withdrawals.
  </p>

  <form id="kyc-form">
    <div class="form-group">
      <label>Full Legal Name (as on ID)</label>
      <input type="text" id="full_name" class="form-input" required>
    </div>

    <div class="form-group">
      <label>Government ID – Front</label>
      <input type="file" id="id-front" class="form-input" accept="image/*" required>
    </div>

    <div class="form-group">
      <label>Government ID – Back</label>
      <input type="file" id="id-back" class="form-input" accept="image/*" required>
    </div>

    <div class="form-group">
      <label>Clear Face Image (Selfie)</label>
      <input type="file" id="face-image" class="form-input" accept="image/*" required>
    </div>

    <button type="submit" id="kyc-submit-btn" class="btn btn-primary btn-block">Submit Verification</button>
  </form>

  <h3 class="mt-3">Submitted Documents</h3>
  <div id="docs-list">Loading…</div>
</div>

<div id="footer-container"></div>

<script src="/assets/js/components.js"></script>
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const supabase = createClient(
  'https://jytmnukzvxirnafukbck.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5dG1udWt6dnhpcm5hZnVrYmNrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxNjQ3MjUsImV4cCI6MjA5OTc0MDcyNX0.ZvGUPTW7dJ3UxL2N1TW0lBCe3H4559HaUEhks7vEbEw'
);
window.supabase = supabase;

// Bucket is PRIVATE — every path is scoped to the user's own folder so the
// storage RLS policy (see kyc_storage_policies.sql) can enforce ownership.
const DOC_TYPES = [
  { inputId: 'id-front',   docType: 'id_front', label: 'ID (front)' },
  { inputId: 'id-back',    docType: 'id_back',  label: 'ID (back)' },
  { inputId: 'face-image', docType: 'selfie',   label: 'Selfie' }
];

function extOf(file) {
  const parts = file.name.split('.');
  return parts.length > 1 ? parts.pop().toLowerCase().replace(/[^a-z0-9]/g, '') || 'jpg' : 'jpg';
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str ?? '';
  return div.innerHTML;
}

async function getCurrentUser() {
  const { data: { user } } = await supabase.auth.getUser();
  if (!user) {
    window.location.href = '/login.html';
    throw new Error('Not authenticated');
  }
  return user;
}

async function getProfile(userId) {
  const { data } = await supabase
    .from('profiles')
    .select('kyc_status, full_name')
    .eq('id', userId)
    .single();
  return data;
}

document.getElementById('kyc-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const submitBtn = document.getElementById('kyc-submit-btn');
  submitBtn.disabled = true;
  submitBtn.textContent = 'Submitting…';

  try {
    const user = await getCurrentUser();

    const profile = await getProfile(user.id);
    if (profile?.kyc_status === 'approved') {
      alert('Your identity is already verified.');
      return;
    }

    const fullName = document.getElementById('full_name').value.trim();
    if (!fullName) {
      alert('Please enter your full legal name.');
      return;
    }

    for (const { inputId, label } of DOC_TYPES) {
      if (!document.getElementById(inputId).files[0]) {
        alert(`Please upload your ${label}.`);
        return;
      }
    }

    for (const { inputId, docType, label } of DOC_TYPES) {
      const file = document.getElementById(inputId).files[0];
      // e.g. "3f2a.../selfie_1737012345.jpg" — first path segment must equal auth.uid()
      const path = `${user.id}/${docType}_${Date.now()}.${extOf(file)}`;

      const { error: uploadErr } = await supabase.storage
        .from('kyc')
        .upload(path, file, { cacheControl: '3600', upsert: false });
      if (uploadErr) throw new Error(`${label} upload failed: ${uploadErr.message}`);

      const { error: insertErr } = await supabase.from('kyc_documents').insert({
        user_id: user.id,
        doc_type: docType,
        image_url: path, // storage PATH, not a public URL — resolved via signed URL on view
        status: 'pending'
      });
      if (insertErr) throw new Error(`Saving ${label} record failed: ${insertErr.message}`);
    }

    await supabase
      .from('profiles')
      .update({ full_name: fullName, kyc_status: 'pending' })
      .eq('id', user.id);

    alert('Verification submitted. An admin will review your documents shortly.');
    location.reload();
  } catch (err) {
    alert(err.message || 'Something went wrong. Please try again.');
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = 'Submit Verification';
  }
});

async function loadDocs() {
  const user = await getCurrentUser();
  const profile = await getProfile(user.id);

  const banner = document.getElementById('kyc-status-banner');
  const form = document.getElementById('kyc-form');

  if (profile?.kyc_status === 'approved') {
    banner.textContent = 'Your identity is verified. Thank you!';
    form.style.display = 'none';
  } else if (profile?.kyc_status === 'pending') {
    banner.textContent = 'Your documents are under review. We will notify you once verified.';
  } else if (profile?.kyc_status === 'rejected') {
    banner.textContent = 'Your last submission was rejected. Please check the notes below and resubmit.';
  }

  const { data: docs, error } = await supabase
    .from('kyc_documents')
    .select('*')
    .eq('user_id', user.id)
    .order('submitted_at', { ascending: false });

  const list = document.getElementById('docs-list');
  if (error || !docs || docs.length === 0) {
    list.innerHTML = 'No documents submitted yet.';
    return;
  }

  list.innerHTML = '';
  for (const doc of docs) {
    // Short-lived signed URL — the bucket has no public access.
    const { data: signed } = await supabase.storage.from('kyc').createSignedUrl(doc.image_url, 300);

    const card = document.createElement('div');
    card.className = 'card mb-1';
    card.innerHTML = `
      ${escapeHtml(doc.doc_type)} – <span class="badge">${escapeHtml(doc.status)}</span>
      ${doc.admin_notes ? `<div class="text-muted" style="font-size:0.85em;">${escapeHtml(doc.admin_notes)}</div>` : ''}
      ${signed?.signedUrl ? `<a href="${signed.signedUrl}" target="_blank" rel="noopener">View (expires in 5 min)</a>` : ''}
    `;
    list.appendChild(card);
  }
}

loadDocs();
</script>
</body>
</html>
