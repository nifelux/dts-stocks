<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KYC Verification – DTL Stocks</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div id="header-container"></div>
  <div class="section" style="max-width:500px; margin:auto; padding-top: 80px;">
    <h2>Identity Verification</h2>
    <p class="alert alert-info">To prevent duplicate accounts, please upload your face image and provide your full legal name. Both are required before withdrawals.</p>
    <form id="kyc-form">
      <div class="form-group">
        <label>Full Legal Name (as on ID)</label>
        <input type="text" id="full_name" class="form-input" required>
      </div>
      <div class="form-group">
        <label>Upload Clear Face Image (Selfie)</label>
        <input type="file" id="face-image" accept="image/*" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Submit Verification</button>
    </form>
    <h3 class="mt-3">Submitted Documents</h3>
    <div id="docs-list"></div>
  </div>
  <div id="footer-container"></div>
  <script src="/assets/js/components.js"></script>
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
    const supabase = createClient('YOUR_URL', 'YOUR_ANON_KEY');
    window.supabase = supabase;

    document.getElementById('kyc-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const user = (await supabase.auth.getUser()).data.user;
      const fullName = document.getElementById('full_name').value;
      const file = document.getElementById('face-image').files[0];
      if (!file) return alert('Upload your face image.');

      // Upload image to kyc bucket
      const fileName = `selfie_${Date.now()}_${file.name}`;
      const { data: upload, error: uploadErr } = await supabase.storage.from('kyc').upload(fileName, file);
      if (uploadErr) return alert(uploadErr.message);
      const { data: { publicUrl } } = supabase.storage.from('kyc').getPublicUrl(upload.path);

      // Save KYC document (type 'selfie')
      await supabase.from('kyc_documents').insert({
        user_id: user.id,
        doc_type: 'selfie',
        image_url: publicUrl
      });

      // Update profile with full name and set KYC status to pending
      await supabase.from('profiles').update({ full_name: fullName, kyc_status: 'pending' }).eq('id', user.id);
      alert('Verification submitted. Admin will review.');
      location.reload();
    });

    async function loadDocs() {
      const user = (await supabase.auth.getUser()).data.user;
      const { data } = await supabase.from('kyc_documents').select('*').eq('user_id', user.id);
      document.getElementById('docs-list').innerHTML = data?.map(d => `<div class="card mb-1">${d.doc_type} – <span class="badge">${d.status}</span></div>`).join('') || 'No documents';
    }
    loadDocs();
  </script>
</body>
</html>
